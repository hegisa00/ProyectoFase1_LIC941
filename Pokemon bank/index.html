<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cajero Pokémon</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Bloque de bienvenida -->
  <div class="usuario text-center py-3">
    <p class="m-0 fs-4">
        ¡Bienvenido! <span id="nombre"></span>
    </p>
    <p class="m-0">
        N° de Cuenta: <span id="cuenta"></span>
    </p>
  </div>
 
  <!-- Menú principal -->
  <div class="container-fluid vh-100 d-flex align-items-center justify-content-between">
    <div class="d-flex flex-column gap-3">
      <button class="menu-btn" onclick="abrir('saldo')">Consultar Saldo</button>
      <button class="menu-btn" onclick="abrir('deposito')">Depositar</button>
      <button class="menu-btn" onclick="abrir('retiro')">Retirar</button>
    </div>

    <div class="centro">
      <img src="img/logo.png" class="logo">
    </div>

    <div class="d-flex flex-column gap-3">
        <button class="menu-btn" onclick="abrir('movimientos')">Movimientos</button>
        <button class="menu-btn" onclick="abrir('pago')">Pago de Servicio</button>
        <button class="menu-btn" onclick="abrir('salir')">Salir</button>
    </div>
  </div>
  
  <!-- Diálogo dinámico -->
  <div id="dialogo" class="dialogo oculto">
    <div class="dialogo-caja">
        <h3 id="dialogo-titulo"></h3>
        <div id="dialogo-contenido"></div>
        <button onclick="cerrarDialogo()">Cerrar</button>
    </div>
  </div>

  <!-- Librerías externas -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Tu script principal -->
  <script src="js/script.js"></script>

  <!-- Script para mostrar nombre y cuenta -->
<script>
  const nombreGuardado = localStorage.getItem("nombreUsuario");
  const cuentaGuardada = localStorage.getItem("cuentaUsuario");

  if (nombreGuardado && cuentaGuardada) {
    document.getElementById("nombre").textContent = nombreGuardado;
    document.getElementById("cuenta").textContent = cuentaGuardada;

    // 🔹 Mostrar botón gráfico solo si es Admin
    if (nombreGuardado === "Admin") {
      const contenedor = document.createElement("div");
      contenedor.className = "d-flex flex-column text-center mt-3";
      contenedor.innerHTML = `<button class="menu-btn" onclick="abrir('grafico')">Gráfico</button>`;
      document.body.appendChild(contenedor);
    }
  } else {
    window.location.href = "login.html";
  }
</script>


</body>
</html>
