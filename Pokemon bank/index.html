<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cajero Pokemon</title>
  <link rel="stylesheet" href="CSS/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="usuario text-center py-3">
    <p class="m-0 fs-4">
        ¡Bienvenido! <span id="nombre">Usuario</span>
    </p>
    <p class="m-0">
        N° de Cuenta: <span id="cuenta">000000000</span>
    </p>
  </div>
 
  <div class="container-fluid vh-100 d-flex align-items-center justify-content-between">
    <div class="d-flex flex-column gap-3">
      <button class="menu-btn" onclick="abrir('saldo')">Consultar Saldo</button>
      <button class="menu-btn" onclick="abrir('deposito')">Depositar</button>
      <button class="menu-btn" onclick="abrir('retiro')">Retirar</button>
    </div>
    <div class="centro">
      <img src="img/logo.png" class="logo">
    </div>

    <div class="d-flex flex-column gap-3">
        <button class="menu-btn" onclick="abrir('movimientos')">Movimientos</button>
        <button class="menu-btn" onclick="abrir('pago')">Pago de Servicio</button>
        <button class="menu-btn" onclick="abrir('salir')">Salir</button>
    </div>
    

  </div>
  
    <div class="d-flex flex-column">
        <button class="menu-btn" onclick="abrir('Grafico')">Grafico</button>

    </div>
  
 <div id="dialogo" class="dialogo oculto">

    <div class="dialogo-caja">

        <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
            gap:10px;
            flex-wrap:wrap;
        ">

            <h3 id="dialogo-titulo" style="margin:0;"></h3>

            <div style="display:flex; gap:10px;">

                <button 
                    id="btn-descargar-pdf"
                    onclick="descargarPDF()"
                    style="
                        display:none;
                        background:#28a745;
                        color:white;
                        border:none;
                        padding:10px 15px;
                        border-radius:8px;
                        cursor:pointer;
                        font-weight:bold;
                    "
                >
                    Descargar PDF
                </button>

                <button 
                    onclick="cerrarDialogo()"
                    style="
                        background:#EE2F52;
                        color:white;
                        border:none;
                        padding:10px 15px;
                        border-radius:8px;
                        cursor:pointer;
                        font-weight:bold;
                    "
                >
                    Cerrar
                </button>

            </div>

        </div>

        <div id="dialogo-contenido"></div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="JS/script.js"></script>
  
  <script>
    const nombreGuardado = localStorage.getItem("nombreUsuario");

    if (nombreGuardado) {
      document.getElementById("nombre").textContent = nombreGuardado;
    } else {
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
