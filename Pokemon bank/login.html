<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Cajero Pokémon</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="vh-100 d-flex align-items-center justify-content-center">

  <div class="login-box p-4 rounded shadow text-center">
    <img src="img/logo.png" alt="Logo" class="logo mb-3">
    <h2 class="mb-4">Iniciar Sesión</h2>
    <form id="loginForm">
      <div class="mb-3">
        <input type="text" class="form-control" id="usuario" placeholder="Usuario" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="clave" placeholder="Contraseña" required>
      </div>
      <button type="submit" class="menu-btn w-100">Entrar</button>
    </form>
    <p id="mensaje" class="text-danger mt-3"></p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault(); // Evita recargar la página

      const usuario = document.getElementById("usuario").value;
      const clave = document.getElementById("clave").value;

      if (usuario === "admin" && clave === "0000") {
        // Guardar el nombre en localStorage
        localStorage.setItem("nombreUsuario", usuario);

        // Redirigir a index.html
        window.location.href = "index.html";
      } else {
        document.getElementById("mensaje").textContent = "Usuario o contraseña incorrectos";
      }
    });
  </script>
</body>
</html>
